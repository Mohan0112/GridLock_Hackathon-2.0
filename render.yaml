services:
  - type: web
    name: gridlock
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: GRIDLOCK_READ_ONLY
        value: "1"
      - key: GRIDLOCK_ENABLE_MUTATIONS
        value: "0"
      - key: GRIDLOCK_ENABLE_SCHEDULER
        value: "0"
      - key: GRIDLOCK_DUCKDB_THREADS
        value: "1"
      - key: GRIDLOCK_DUCKDB_MEMORY_LIMIT
        value: "256MB"
